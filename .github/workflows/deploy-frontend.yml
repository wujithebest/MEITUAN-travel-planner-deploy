name: Deploy Frontend to CloudBase

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        timeout-minutes: 5
        run: npm ci --no-audit --no-fund

      - name: Create .env.production
        working-directory: frontend
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=https://meituan-travel-planner-281308-9-1320524552.sh.run.tcloudbase.com
          VITE_API_ROUTE_PATH=/api/route/generate
          VITE_USE_MOCK=false
          VITE_GAODE_JSAPI_KEY=${{ secrets.VITE_GAODE_JSAPI_KEY }}
          EOF

      - name: Build frontend
        working-directory: frontend
        timeout-minutes: 5
        run: npm run build

      - name: Install CloudBase CLI
        timeout-minutes: 3
        run: npm install -g @cloudbase/cli@3 --no-audit --no-fund

      - name: Login CloudBase CLI
        timeout-minutes: 2
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy to CloudBase Static Hosting
        timeout-minutes: 30
        env:
          COS_SDK_KEEPALIVE: false
        run: tcb hosting deploy ./frontend/dist / -e ${{ secrets.TCB_ENV_ID }} --concurrency 5 --retry-count 3 --retry-interval 2000

      - name: Install CloudBase Manager Node SDK
        timeout-minutes: 3
        run: npm install -g @cloudbase/manager-node@3 --no-audit --no-fund

      - name: Configure CloudBase Static Hosting SPA fallback
        timeout-minutes: 3
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -e
          mkdir -p /tmp/tcb-hosting-config
          cd /tmp/tcb-hosting-config
          npm init -y > /dev/null 2>&1
          npm install @cloudbase/manager-node --no-audit --no-fund
          cat > configure.js <<'EOF'
          const CloudBase = require('@cloudbase/manager-node');
          console.log('CloudBase module loaded:', typeof CloudBase);
          const cloudbase = new CloudBase({
            secretId: process.env.TCB_SECRET_ID,
            secretKey: process.env.TCB_SECRET_KEY,
            envId: process.env.TCB_ENV_ID,
          });
          console.log('CloudBase instance created');
          (async () => {
            try {
              const res = await cloudbase.hosting.setWebsiteDocument({
                indexDocument: 'index.html',
                errorDocument: 'index.html',
              });
              console.log('setWebsiteDocument response:', JSON.stringify(res, null, 2));
              if (res.statusCode !== 200 && res.code !== 0 && res.statusCode !== undefined) {
                throw new Error('Failed to set website document: ' + JSON.stringify(res));
              }
              console.log('SPA fallback configured successfully');
            } catch (err) {
              console.error('Error configuring SPA fallback:', err);
              process.exit(1);
            }
          })();
          EOF
          node configure.js
